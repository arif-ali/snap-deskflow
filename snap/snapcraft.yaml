name: deskflow
summary: Share a single keyboard and mouse between multiple computers.
description: |
  Deskflow is a free and open source keyboard and mouse sharing app. Use the
  keyboard, mouse, or trackpad of one computer to control nearby computers, and
  work seamlessly between them. It's like a software KVM (but without the
  video). TLS encryption is enabled by default. Wayland is supported. Clipboard
  sharing is supported.
grade: devel
base: core26
build-base: devel
confinement: devmode
license: GPL-2.0-only
version: v1.26.0

apps:
  deskflow:
    command: usr/local/bin/deskflow
  deskflow-core:
    command: usr/local/bin/deskflow-core

parts:
  deskflow:
    plugin: cmake
    source: https://github.com/deskflow/deskflow
    source-type: git
    source-tag: $SNAPCRAFT_PROJECT_VERSION
    cmake-parameters:
      - -DCMAKE_BUILD_TYPE=Release
    build-packages:
      - build-essential
      - ninja-build
      - xorg-dev
      - libx11-dev
      - libxtst-dev
      - libssl-dev
      - libglib2.0-dev
      - libxkbfile-dev
      - qt6-base-dev
      - qt6-tools-dev
      - libgtk-3-dev
      - libgtest-dev
      - libgmock-dev
      - libei-dev
      - libportal-dev
    stage-packages:
      - libb2-1
      - libcurl3t64-gnutls
      - libdouble-conversion3
      - libegl1
      - libei1
      - libfontconfig1
      - libglvnd0
      - libglx0
      - libgomp1
      - libgraphite2-3
      - libharfbuzz0b
      - libicu78
      - libldap2
      - libmd4c0
      - libnghttp2-14
      - libopengl0
      - libpcre2-16-0
      - libportal1
      - libproxy1v5
      - libpsl5t64
      - libqt6core6t64
      - libqt6dbus6
      - libqt6gui6
      - libqt6network6
      - libqt6widgets6
      - libqt6xml6
      - librtmp1
      - libsasl2-2
      - libssh2-1t64
      - libx11-6
      - libxau6
      - libxcb1
      - libxdmcp6
      - libxext6
      - libxi6
      - libxinerama1
      - libxkbfile1
      - libxrandr2
      - libxrender1
      - libxtst6
